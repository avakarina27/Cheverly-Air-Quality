<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cheverly Air Quality | Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <style>
    :root { 
      --brand-navy: #1a305e; --search-blue: #4477ce; 
      --aqi-green: #00e400; --aqi-yellow: #ffff00; --aqi-orange: #ff7e00;
      --aqi-red: #ff0000;
    }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Segoe UI", sans-serif; overflow: hidden; background: #fdfdfd; }
    .topbar { background: var(--brand-navy); color: white; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; height: 64px; z-index: 2000; position: relative; }
    #layout { display: flex; height: calc(100vh - 64px); width: 100vw; }
    #sidebar { width: 380px; min-width: 380px; background: #f4f6f8; border-right: 1px solid #ddd; padding: 1.25rem; overflow-y: auto; box-sizing: border-box; }
    .card { background: white; padding: 1.25rem; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    #map { height: 45%; width: 100%; border-bottom: 1px solid #ddd; z-index: 1; }
    #chart-box { height: 55%; width: 100%; padding: 1.5rem; box-sizing: border-box; background: white; }
    .aqi-val { font-size: 72px; font-weight: 900; display: block; text-align: center; line-height: 1.1; }
    .subval { margin-top: 10px; font-size: 1.2rem; font-weight: 800; text-align: center; }
    .sublabel { font-size: 0.75rem; color: #777; font-weight: bold; margin-top: 4px; text-align: center; text-transform: uppercase; }
    .error-msg { color: #d93025; font-weight: bold; text-align: center; margin-top: 15px; font-size: 0.9rem; }
  </style>
</head>

<body>
<header class="topbar">
  <div style="font-size: 1.25rem; font-weight: bold;">Cheverly Air Quality</div>
  <nav><a href="index.html" style="color: white; text-decoration: none;">Home</a></nav>
</header>

<div id="layout">
  <aside id="sidebar">
    <div class="card">
      <label style="font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase;">Station Selection</label>
      <select id="devSel" onchange="handleDropdownChange(this.value)"></select>
    </div>

    <div class="card">
      <div id="statName" style="font-weight:bold; font-size:1rem; margin-bottom:10px; color:var(--brand-navy); text-align:center;">Select a Station</div>
      <div id="statAQI" class="aqi-val" style="color:#ccc;">--</div>
      <div class="sublabel">Live PM2.5 AQI</div>
      
      <div id="statCE" class="subval" style="color:#ccc;">--</div>
      <div class="sublabel">24-Hour Adjusted CE-AQI</div>
      
      <div id="val_param" style="text-align:center; margin-top:15px; font-weight:bold;">--</div>
      <div id="status-display" class="error-msg"></div>
    </div>
  </aside>

  <div id="main-content" style="flex:1; display:flex; flex-direction:column;">
    <div id="map"></div>
    <div id="chart-box"><canvas id="airChart"></canvas></div>
  </div>
</div>

<script>
  const API_ENDPOINT = "/api/get_air_quality";
  
  const SENSORS = { 
    "203601": "EJAT.CV.1.203601", "284362": "EJAT.PG.1.284362", "52823": "EJAT.CV.6.52823",
    "53677": "EJAT.CV.1.53677", "54239": "EJAT.CV.6.54239", "MOD-00745": "QuantAQ 745"
  };

  const LOCATIONS = {
    "203601": [38.9213, -76.9175],
    "MOD-00745": [38.9051, -76.9100],
    "52823": [38.9240, -76.9150]
  };

  let markerMap = {};
  const map = L.map("map").setView([38.9213, -76.9175], 14);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  function getAQIColor(aqi) {
    const v = Number(aqi);
    if (isNaN(v)) return "#ccc";
    if (v <= 50) return "#00e400";
    if (v <= 100) return "#ffff00";
    if (v <= 150) return "#ff7e00";
    return "#ff0000";
  }

  function handleDropdownChange(id) {
    if(markerMap[id]) {
      map.flyTo(markerMap[id].getLatLng(), 15);
      updateDisplay(id);
    }
  }

  async function updateDisplay(id) {
    const statusEl = document.getElementById("status-display");
    try {
      const res = await fetch(API_ENDPOINT);
      if (!res.ok) {
        statusEl.innerText = `API Error: ${res.status}. Check vercel.json.`;
        return;
      }

      const data = await res.json();

      if (data.id === "DB_CONNECT_ERROR" || (data[0] && data[0].id === "DB_CONNECT_ERROR")) {
        statusEl.innerText = "Database Offline: Check Aiven Credentials.";
        return;
      }

      const sensor = data.find(s => String(s.id) === String(id));
      if (sensor) {
        statusEl.innerText = "";
        document.getElementById("statName").innerText = SENSORS[id] || id;
        
        const liveVal = parseFloat(sensor.live);
        const ceVal = parseFloat(sensor.ce_aqi);

        document.getElementById("statAQI").innerText = isNaN(liveVal) ? "--" : Math.round(liveVal);
        document.getElementById("statAQI").style.color = getAQIColor(liveVal);
        document.getElementById("statCE").innerText = isNaN(ceVal) ? "--" : Math.round(ceVal);
        document.getElementById("statCE").style.color = getAQIColor(ceVal);
        
        // Safety check for toFixed
        document.getElementById("val_param").innerText = (!isNaN(liveVal)) ? liveVal.toFixed(2) + " µg/m³" : "--";
      }
    } catch (err) {
      statusEl.innerText = "Connection Failed.";
    }
  }

  async function init() {
    const sel = document.getElementById("devSel");
    const statusEl = document.getElementById("status-display");
    try {
      const res = await fetch(API_ENDPOINT);
      if (!res.ok) throw new Error();
      const data = await res.json();

      if (data.id === "DB_CONNECT_ERROR" || (data[0] && data[0].id === "DB_CONNECT_ERROR")) {
        statusEl.innerText = "Database Connection Failed.";
        return;
      }

      data.forEach(sensor => {
        const pos = LOCATIONS[sensor.id] || [38.9213 + (Math.random()*0.005), -76.9175 + (Math.random()*0.005)];
        const m = L.circleMarker(pos, {
          radius: 12, fillColor: getAQIColor(sensor.ce_aqi), color: "#000", weight: 2, fillOpacity: 0.9
        }).addTo(map);

        m.on("click", () => { sel.value = sensor.id; handleDropdownChange(sensor.id); });
        markerMap[sensor.id] = m;
        sel.add(new Option(SENSORS[sensor.id] || sensor.id, sensor.id));
      });

      if (sel.options.length) handleDropdownChange(sel.options[0].value);
    } catch (err) {
      statusEl.innerText = "API 404: Check file name in /api folder.";
    }
  }

  init();
</script>
</body>
</html>
