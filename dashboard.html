<!DOCTYPE html>
<html>
<head>
  <title>Cheverly Air Quality Network</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@3.8.0/dist/geosearch.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-geosearch@3.8.0/dist/bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin:0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
    #header { background: #1a305e; color: white; padding: 15px; display: flex; justify-content: space-between; }
    #main { display: flex; flex: 1; }
    #map { flex: 2; height: 100%; }
    #details { flex: 1; background: #f8f9fa; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    .chart-container { height: 250px; background: white; border: 1px solid #ddd; border-radius: 8px; }
  </style>
</head>
<body>

<div id="header">
  <div style="font-weight:bold;">EJAT NETWORK</div>
  <div>DC Area Average: <span id="dcAvg">--</span> AQI</div>
</div>

<div id="main">
  <div id="map"></div>
  <aside id="details">
    <div id="info">
      <h3 id="selName">Select a Sensor</h3>
      <p>Type: <span id="selType">--</span></p>
      <h1 id="selAQI">--</h1>
    </div>
    <div class="chart-container">
      <canvas id="timeChart"></canvas>
    </div>
  </aside>
</div>

<script>
  const map = L.map('map').setView([38.922, -76.915], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  // 1. ADDRESS SEARCH
  const search = new GeoSearch.GeoSearchControl({
    provider: new GeoSearch.OpenStreetMapProvider(),
    style: 'bar', showMarker: true, keepResult: true,
    placeholder: 'Search Cheverly Address...'
  });
  map.addControl(search);

  // 2. TIMESERIES CHART
  const ctx = document.getElementById('timeChart').getContext('2d');
  const chart = new Chart(ctx, {
    type: 'line',
    data: { labels: ['10m','9m','8m','7m','6m','5m','4m','3m','2m','Now'], datasets: [{ label: 'AQI History', data: [], borderColor: '#4477ce' }] },
    options: { maintainAspectRatio: false }
  });

  // 3. LOAD ALL SENSORS
  async function loadData() {
    const res = await fetch('/api/aq');
    const data = await res.json();
    let sum = 0, count = 0;

    data.forEach(s => {
      const color = s.aqi > 100 ? 'red' : s.aqi > 50 ? 'yellow' : 'green';
      const marker = L.circleMarker([s.lat, s.lon], { radius: 10, fillColor: color, color: '#000', weight: 1, fillOpacity: 0.8 }).addTo(map);

      // HOVER DATA
      marker.bindTooltip(`<b>${s.type}: ${s.id}</b><br>AQI: ${s.aqi}`);

      marker.on('click', () => {
        document.getElementById('selName').innerText = s.name;
        document.getElementById('selType').innerText = s.type;
        document.getElementById('selAQI').innerText = s.aqi;
        // Update Chart with dummy historical data
        chart.data.datasets[0].data = Array.from({length: 10}, () => Math.floor(Math.random() * 60));
        chart.update();
      });

      if(s.aqi > 0) { sum += s.aqi; count++; }
    });
    document.getElementById('dcAvg').innerText = Math.round(sum/count);
  }

  loadData();
</script>
</body>
</html>
