<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dashboard</title> 
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <style>
    :root { 
      --brand-navy: #1a305e; 
      --search-blue: #4477ce; 
      --aqi-orange: #ff7e00;
      --aqi-red: #ff0000;
    }

    html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Segoe UI", Roboto, sans-serif; overflow: hidden; background: #fdfdfd; }
    
    .topbar { 
      background: var(--brand-navy); 
      color: white; 
      padding: 0 2rem; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      height: 64px; 
      z-index: 2000; 
      position: relative; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .brand { font-size: 1.25rem; font-weight: bold; }
    .nav a { color: white; text-decoration: none; margin-left: 1.5rem; font-size: 0.95rem; font-weight: 500; opacity: 0.8; transition: opacity 0.2s; }
    .nav a:hover { opacity: 1; }
    .nav a.active { opacity: 1; border-bottom: 2px solid white; padding-bottom: 4px; }

    #layout { display: flex; height: calc(100vh - 64px); width: 100vw; }
    #sidebar { width: 380px; min-width: 380px; background: #f4f6f8; border-right: 1px solid #ddd; padding: 1.25rem; overflow-y: auto; box-sizing: border-box; }
    
    .card { background: white; padding: 1.25rem; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    label { font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
    
    input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 0.9rem; }
    button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 8px; border: none; background: var(--search-blue); color: white; font-weight: bold; cursor: pointer; transition: filter 0.2s; font-size: 0.9rem; }
    button:hover { filter: brightness(1.1); }

    #main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
    #map { height: 45%; width: 100%; border-bottom: 1px solid #ddd; z-index: 1; }
    #chart-box { height: 55%; width: 100%; padding: 1.5rem; box-sizing: border-box; background: white; }

    .aqi-val { font-size: 72px; font-weight: 900; display: block; text-align: center; line-height: 1.1; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }
    .sublabel { font-size: 0.75rem; color: #777; font-weight: bold; margin-top: 4px; text-align: center; text-transform: uppercase; }
    
    .kv { display: grid; grid-template-columns: 140px 1fr; gap: 6px 10px; font-size: 0.9rem; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
    .kv .k { font-weight: 800; color: #444; }
    .kv .v { font-weight: 700; color: var(--aqi-red); text-align: left; }
  </style>
</head>

<body>
<header class="topbar">
  <div class="brand">Cheverly Air Quality</div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="dashboard.html" class="active">Map & Data</a>
    <a href="writeup.html">FAQs</a>
  </nav>
</header>

<div id="layout">
  <aside id="sidebar">
    <div class="card">
      <label>Location Search</label>
      <input type="text" id="addrInput" placeholder="Enter Street Address">
      <button id="locateBtn">Find Nearest Station</button>
    </div> 

    <div class="card">
      <label>Station Selection</label>
      <select id="devSel" onchange="handleDropdownChange(this.value)"></select>
    </div>

    <div class="card">
      <label id="readingLabel">Live Station Reading</label>
      <div id="details">
        <div id="statName" style="font-weight:bold; font-size:1rem; margin-bottom:10px; color:var(--brand-navy); text-align:center;">--</div>
        <div id="statAQI" class="aqi-val" style="color:#ccc;">--</div>
        <div class="sublabel" id="currentLabel">Current Measurement</div>
        
        <div id="extraDetails" class="kv">
          <div class="k" id="label_param">Concentration:</div>
          <div class="v" id="val_param">--</div>
        </div>
      </div>
    </div>
  </aside>

  <div id="main-content">
    <div id="map"></div>
    <div id="chart-box"><canvas id="airChart"></canvas></div>
  </div>
</div>

<script>
  const API_PROXY = "/api/aq";
  const SENSORS = { "284362": "EJAT.PG.1.284362", "203577": "EJAT.CV.2.203577 (Supersite)", "52823": "EJAT.CV.6.52823", "53677": "EJAT.CV.1.53677" };
  const C12S = [ { compId: "D14781", name: "C-12 Cheverly Supersite", lat: 38.922, lon: -76.915 }, { compId: "D14645", name: "C-12 Mr. Jones", lat: 38.925, lon: -76.910 } ];

  let markerMap = {};
  const map = L.map("map").setView([38.922, -76.915], 13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  const ctx = document.getElementById("airChart").getContext("2d");
  const chart = new Chart(ctx, {
    type: "line",
    data: { datasets: [{ label: "Data Trend", data: [], borderColor: "#4477ce", backgroundColor: "rgba(68, 119, 206, 0.1)", fill: true, tension: 0.1 }] },
    options: { 
      responsive: true, 
      maintainAspectRatio: false, 
      scales: { 
        x: { type: "time", time: { unit: 'hour' } },
        y: { beginAtZero: true, title: { display: true, text: "Value" } } 
      } 
    }
  });

  async function updateDisplay(id) {
    const start = Math.floor(Date.now() / 1000) - 86400;
    let chartData = [];
    let label = "";

    if (id.startsWith("C12-")) {
      const compId = id.replace("C12-", "");
      const res = await fetch(`${API_PROXY}?action=grove_history&compId=${compId}&start=${start}`).then(r => r.json());
      
      // Ensure data is sorted and mapped correctly for Chart.js
      chartData = (res.data || [])
        .filter(r => r.streamId === "880nm")
        .map(r => ({ x: r.time * 1000, y: parseFloat(r.data) }))
        .sort((a, b) => a.x - b.x);
      
      label = "Black Carbon (ng/m³)";
      const last = chartData.length > 0 ? chartData[chartData.length - 1].y : 0;
      document.getElementById("statAQI").innerText = Math.round(last);
      document.getElementById("label_param").innerText = "BC Concentration:";
      document.getElementById("val_param").innerText = last.toFixed(1) + " ng/m³";
      document.getElementById("statName").innerText = C12S.find(c => "C12-"+c.compId === id).name;
    } else {
      const res = await fetch(`${API_PROXY}?action=purpleair_history&id=${id}&start=${start}`).then(r => r.json());
      chartData = (res.data || [])
        .map(r => ({ x: r[0] * 1000, y: parseFloat(r[1]) }))
        .sort((a, b) => a.x - b.x);
      
      label = "PM2.5 AQI";
      const last = chartData.length > 0 ? chartData[chartData.length - 1].y : 0;
      document.getElementById("statAQI").innerText = Math.round(last);
      document.getElementById("label_param").innerText = "PM2.5 Reading:";
      document.getElementById("val_param").innerText = last.toFixed(1) + " µg/m³";
      document.getElementById("statName").innerText = SENSORS[id];
    }

    chart.data.datasets[0].label = label;
    chart.data.datasets[0].data = chartData;
    chart.options.scales.y.title.text = label;
    chart.update();
  }

  function handleDropdownChange(val) {
    if (markerMap[val]) {
      map.flyTo(markerMap[val].getLatLng(), 15);
      updateDisplay(val);
    }
  }

  function init() {
    const sel = document.getElementById("devSel");
    
    C12S.forEach(c => {
      const m = L.circleMarker([c.lat, c.lon], { radius: 10, color: 'blue', fillOpacity: 0.8 }).addTo(map);
      markerMap["C12-" + c.compId] = m;
      sel.add(new Option(c.name, "C12-" + c.compId));
      m.on('click', () => { sel.value = "C12-" + c.compId; handleDropdownChange(sel.value); });
    });

    Object.keys(SENSORS).forEach(id => {
      const m = L.circleMarker([38.922 + (Math.random()*0.01), -76.915 + (Math.random()*0.01)], { radius: 10, color: 'green', fillOpacity: 0.8 }).addTo(map);
      markerMap[id] = m;
      sel.add(new Option(SENSORS[id], id));
      m.on('click', () => { sel.value = id; handleDropdownChange(id); });
    });

    if (sel.options.length > 0) handleDropdownChange(sel.value);
  }

  init();
</script>
</body>
</html>
