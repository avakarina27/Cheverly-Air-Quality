<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EJAT Air Quality Network</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <style>
    :root { --brand-navy: #1a305e; --search-blue: #4477ce; }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Segoe UI", sans-serif; overflow: hidden; background: #fdfdfd; }
    .topbar { background: var(--brand-navy); color: white; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; height: 60px; z-index: 2000; }
    #layout { display: flex; height: calc(100vh - 60px); width: 100vw; }
    #sidebar { width: 380px; min-width: 380px; background: #f4f6f8; border-right: 1px solid #ddd; padding: 15px; overflow-y: auto; box-sizing: border-box; }
    .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 12px; }
    label { font-size: 0.7rem; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 5px; display: block; }
    input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 4px; border: none; background: var(--search-blue); color: white; font-weight: bold; cursor: pointer; }
    #main-content { flex: 1; display: flex; flex-direction: column; height: 100%; }
    #map { height: 45%; width: 100%; border-bottom: 1px solid #ddd; z-index: 1; }
    #chart-box { height: 55%; width: 100%; padding: 15px; box-sizing: border-box; background: white; }
    .aqi-val { font-size: 64px; font-weight: 900; display: block; text-align: center; line-height: 1.1; text-shadow: 1px 1px 0 #000; }
  </style>
</head>
<body>

<header class="topbar"><div class="brand">EJAT Air Quality Dashboard</div></header>

<div id="layout">
  <aside id="sidebar">
    <div class="card">
      <label>Location Search</label>
      <input type="text" id="addrInput" placeholder="Enter Address (e.g. 6401 Forest Rd)">
      <button id="locateBtn">Find Nearest Station</button>
    </div>
    <div class="card">
      <label>Station Index</label>
      <select id="devSel" onchange="handleDropdownChange(this.value)"></select>
    </div>
    <div id="displayCard" class="card">
      <label id="statName">--</label>
      <div id="statAQI" class="aqi-val" style="color:#ccc;">--</div>
      <div style="text-align:center; font-size:0.75rem; color:#666; font-weight:bold;">CURRENT AQI</div>
      <div id="statCE" class="aqi-val" style="color:#ccc;">--</div>
      <div style="text-align:center; font-size:0.75rem; color:#666; font-weight:bold;">24HR CE AQI</div>
    </div>
  </aside>
  <div id="main-content">
    <div id="map"></div>
    <div id="chart-box"><canvas id="airChart"></canvas></div>
  </div>
</div>

<script>
  const API_PROXY = "/api/aq";
  
  const PURPLEAIRS = {
    "284362": "EJAT.PG.1.284362", "52823": "EJAT.CV.6.52823", "53677": "EJAT.CV.1.53677", "54239": "EJAT.CV.6.54239", 
    "54293": "EJAT.CV.2.54293", "57777": "EJAT.CV.1.57777", "57783": "EJAT.CV.6.57783", "57811": "EJAT.CV.4.57811", 
    "57841": "EJAT.CV.3.57841", "57955": "EJAT.FH.1.57955", "160037": "EJAT.PG.1.160037", "175563": "EJAT.PG.1.175563", 
    "178169": "EJAT.PG.1.178169", "181253": "EJAT.CH.1.181253", "184191": "EJAT.PG.1.184191", "185085": "EJAT.FH.1.185085", 
    "197937": "EJAT.PG.1.197937", "203577": "EJAT.CV.2.203577 (Supersite)", "203597": "EJAT.FH.1.203597", 
    "203601": "EJAT.CV.1.203601", "207729": "EJAT.CV.1.207729", "211993": "EJAT.CV.3.211993", "218227": "EJAT.PG.1.218227", 
    "218237": "EJAT.PG.1.218237", "218273": "EJAT.PG.1.218273"
  };

  const SPODS = [
    { sn: "MOD-00536", name: "QuantAQ MOD-00536", lat: 38.920551, lon: -76.91951 },
    { sn: "MOD-00537", name: "QuantAQ MOD-00537", lat: 39.243000, lon: -76.512400 },
    { sn: "MOD-00733", name: "QuantAQ MOD-00733", lat: 38.905700, lon: -76.911500 },
    { sn: "MOD-00745", name: "QuantAQ MOD-00745", lat: 38.905100, lon: -76.910000 },
    { sn: "MOD-00746", name: "QuantAQ MOD-00746", lat: 39.143200, lon: -76.846000 },
    { sn: "MOD-00747", name: "QuantAQ MOD-00747", lat: 39.233944, lon: -76.504501 },
    { sn: "MOD-00748", name: "QuantAQ MOD-00748", lat: 38.969685, lon: -76.542290 },
    { sn: "MOD-00749", name: "QuantAQ MOD-00749", lat: 39.055400, lon: -76.878800 },
    { sn: "MOD-00760", name: "QuantAQ MOD-00760", lat: 39.055200, lon: -76.878600 },
    { sn: "MOD-00824", name: "QuantAQ MOD-00824", lat: 39.224470, lon: -76.587008 } 
  ];

  const C12S = [
    { sn: "C12-001", name: "C12 - 6401 Forest Rd", lat: 38.9231, lon: -76.9142 }
  ];

  let markerMap = {};
  let markerMeta = {};
  const map = L.map("map").setView([38.922, -76.915], 11);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  const chart = new Chart(document.getElementById("airChart").getContext("2d"), {
    type: "line",
    data: { datasets: [
      { label: "Station History", data: [], borderColor: "#4477ce", fill: true, backgroundColor: "rgba(68,119,206,0.1)" },
      { label: "City Average", data: [], borderColor: "#ff4444", borderDash: [5,5], pointRadius: 0, fill: false }
    ]},
    options: { responsive: true, maintainAspectRatio: false, scales: { x: { type: "time" }, y: { beginAtZero: true } } }
  });

  function getAQIColor(aqi) {
    if (aqi <= 50) return "#00e400";
    if (aqi <= 100) return "#ffff00";
    if (aqi <= 150) return "#ff7e00";
    return "#ff0000";
  }

  function calculateAQI(pm) {
    if (!pm || pm < 0) return 0;
    if (pm <= 12) return Math.round((50/12)*pm);
    if (pm <= 35.4) return Math.round(((100-51)/(35.4-12.1))*(pm-12.1)+51);
    return Math.round(((150-101)/(55.4-35.5))*(pm-35.5)+101);
  }

  async function updateDisplay(id) {
    const start = Math.floor(Date.now() / 1000) - 86400;
    let series = [];
    
    if (id.startsWith("MOD") || id.startsWith("C12")) {
      // Fetch QuantAQ history via proxy
      const dateStr = new Date().toISOString().split('T')[0];
      const res = await fetch(`${API_PROXY}?action=quantaq_by_date&sn=${id}&date=${dateStr}`).then(r=>r.json());
      if (res?.data) {
        series = res.data.map(r => ({ x: Date.parse(r.timestamp), y: calculateAQI(r.pm25) }));
      }
    } else {
      const res = await fetch(`${API_PROXY}?action=purpleair_history&id=${id}&start=${start}`).then(r=>r.json());
      if (res?.data) {
        series = res.data.map(r => ({ x: r[0]*1000, y: calculateAQI(r[1]) }));
      }
    }

    if (series.length > 0) {
      const latest = series[series.length-1].y;
      setLeftPanel(markerMeta[id].name, latest, latest);
      chart.data.datasets[0].data = series.sort((a,b)=>a.x-b.x);
      chart.update();
      updateMarkerColor(id, latest);
    }
  }

  function updateMarkerColor(id, aqi) {
    const color = getAQIColor(aqi);
    if (id.startsWith("MOD") || id.startsWith("C12")) {
      markerMap[id].setIcon(L.divIcon({className:"", html:`<div style="width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:22px solid ${color};filter:drop-shadow(0 0 2px #000);"></div>`, iconSize:[24,24]}));
    } else {
      markerMap[id].setStyle({fillColor: color});
    }
  }

  function setLeftPanel(n, a, c) {
    document.getElementById("statName").innerText = n;
    document.getElementById("statAQI").innerText = a; document.getElementById("statAQI").style.color = getAQIColor(a);
    document.getElementById("statCE").innerText = c; document.getElementById("statCE").style.color = getAQIColor(c);
  }

  // FIXED ADDRESS SEARCH
  document.getElementById("locateBtn").onclick = async () => {
    const addr = document.getElementById("addrInput").value;
    if (!addr) return;
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr + ", Cheverly, MD")}`);
    const data = await res.json();
    if (data.length > 0) {
      const loc = L.latLng(data[0].lat, data[0].lon);
      map.setView(loc, 15);
      L.marker(loc).addTo(map).bindPopup("Searching from here").openPopup();
      
      let nearest = null; let minDist = Infinity;
      Object.keys(markerMap).forEach(id => {
        let d = loc.distanceTo(markerMap[id].getLatLng());
        if (d < minDist) { minDist = d; nearest = id; }
      });
      if (nearest) { document.getElementById("devSel").value = nearest; handleDropdownChange(nearest); }
    }
  };

  function handleDropdownChange(id) { map.flyTo(markerMap[id].getLatLng(), 15); updateDisplay(id); }

  async function init() {
    const sel = document.getElementById("devSel");
    [...SPODS, ...C12S].forEach(s => {
      const m = L.marker([s.lat, s.lon], { icon: L.divIcon({className:"", html:`<div style="width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:22px solid #999;filter:drop-shadow(0 0 2px #000);"></div>`, iconSize:[24,24]}) }).addTo(map);
      markerMap[s.sn] = m; markerMeta[s.sn] = {name: s.name};
      sel.add(new Option(s.name, s.sn));
      m.on("click", () => { sel.value = s.sn; handleDropdownChange(s.sn); });
      updateDisplay(s.sn); 
    });

    const paBox = await fetch(`${API_PROXY}?action=purpleair_box`).then(r=>r.json());
    paBox?.data?.forEach(r => {
      const id = String(r[0]);
      if (PURPLEAIRS[id]) {
        const m = L.circleMarker([r[1], r[2]], { radius: 10, fillColor: "#999", color: "#000", fillOpacity: 0.8 }).addTo(map);
        markerMap[id] = m; markerMeta[id] = {name: PURPLEAIRS[id]};
        sel.add(new Option(PURPLEAIRS[id], id));
        m.on("click", () => { sel.value = id; handleDropdownChange(id); });
        updateDisplay(id);
      }
    });
  }

  init();
</script>
</body>
</html>
