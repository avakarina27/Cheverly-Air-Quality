<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EJAT | Nexus Air Quality Control</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <style>
    :root {
      --bg-dark: #0b0e14;
      --card-bg: #161b22;
      --neon-blue: #00d2ff;
      --accent-blue: #58a6ff;
      --text-main: #c9d1d9;
      --text-dim: #8b949e;
      --border: #30363d;
    }

    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      font-family: "Inter", "Segoe UI", sans-serif;
      overflow: hidden; background: var(--bg-dark); color: var(--text-main);
    }

    .topbar {
      background: var(--card-bg); color: white;
      padding: 0 25px; display: flex; justify-content: space-between;
      align-items: center; height: 60px; border-bottom: 1px solid var(--neon-blue);
      box-shadow: 0 0 20px rgba(0, 210, 255, 0.15); z-index: 2000;
    }
    .brand { font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; color: var(--neon-blue); }
    .nav a { color: var(--text-dim); text-decoration: none; margin-left: 20px; font-size: 0.8rem; transition: 0.3s; text-transform: uppercase; }
    .nav a:hover { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }

    #layout { display: flex; height: calc(100vh - 60px); width: 100vw; }

    #sidebar {
      width: 380px; min-width: 380px;
      background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(12px);
      border-right: 1px solid var(--border);
      padding: 20px; overflow-y: auto; box-sizing: border-box;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      padding: 18px; border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 15px; transition: border 0.3s;
    }

    label {
      font-size: 0.65rem; font-weight: 800; color: var(--neon-blue);
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; display: block;
    }

    input, select {
      width: 100%; padding: 12px; background: #0d1117; border: 1px solid var(--border);
      color: white; border-radius: 8px; outline: none; font-size: 0.9rem;
    }

    button {
      width: 100%; padding: 14px; margin-top: 10px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
      color: #0b0e14; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    }

    #main-content { flex: 1; display: flex; flex-direction: column; }
    #map { height: 45%; width: 100%; background: #0b0e14 !important; border-bottom: 1px solid var(--border); }
    #chart-box { height: 55%; width: 100%; padding: 25px; background: var(--bg-dark); box-sizing: border-box; }

    .aqi-val { font-size: 82px; font-weight: 900; display: block; text-align: center; line-height: 1; margin: 10px 0; }
    .subval { font-size: 1.8rem; font-weight: 800; text-align: center; }

    .legend-item { display: flex; align-items: center; margin-bottom: 12px; font-size: 0.75rem; font-weight: 600; }
    .l-circle { width: 16px; height: 16px; border-radius: 50%; margin-right: 15px; border: 2px solid rgba(255,255,255,0.3); }

    .search-pulse {
      width: 20px; height: 20px; background: rgba(255, 0, 0, 0.4);
      border: 2px solid red; border-radius: 50%;
      box-shadow: 0 0 0 rgba(255, 0, 0, 0.4);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
      70% { transform: scale(1.2); box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
    }
    
    .kv { display: grid; grid-template-columns: 140px 1fr; gap: 4px 8px; font-size: 0.85rem; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px; }
    .kv .k { font-weight: bold; color: var(--text-dim); }
    .kv .v { font-weight: bold; color: #ff4444; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="brand">NEXUS // CHEVERLY AIR NETWORK</div>
  <nav class="nav">
    <a href="index.html">SENSORS</a>
    <a href="dashboard.html" style="color:var(--neon-blue)">LIVE DATA</a>
    <a href="writeup.html">INSIGHTS</a>
  </nav>
</header>

<div id="layout">
  <aside id="sidebar">
    <div class="card">
      <label>Location Proxy Search</label>
      <input type="text" id="addrInput" placeholder="Enter target address...">
      <button id="locateBtn">Engage Search</button>
    </div>

    <div class="card">
      <label>Active Sensor Uplink</label>
      <select id="devSel" onchange="handleDropdownChange(this.value)"></select>
    </div>

    <div class="card">
      <label>Telemetry: <span id="statName">--</span></label>
      <div id="statAQI" class="aqi-val" style="color:#333;">--</div>
      <div style="text-align:center; font-size:0.6rem; letter-spacing:2px; color:var(--text-dim); margin-bottom:20px;">CURRENT AQI</div>
      
      <div id="statCE" class="subval" style="color:#333; border-top:1px solid var(--border); padding-top:10px;">--</div>
      <div style="text-align:center; font-size:0.6rem; color:var(--text-dim)">24HR CE AQI</div>

      <div id="c12Vars" class="kv" style="display:none;">
        <div class="k">Black Carbon:</div><div class="v" id="c12_bc">--</div>
        <div class="k">Last Uplink:</div><div class="v" id="c12_time">--</div>
      </div>
    </div>

    <div class="card">
      <label>Interface Key</label>
      <div class="legend-item"><div class="l-circle" style="background:#00e400;"></div> Good (0-50)</div>
      <div class="legend-item"><div class="l-circle" style="background:#ffff00;"></div> Moderate (51-100)</div>
      <div class="legend-item"><div class="l-circle" style="background:#ff7e00;"></div> Sensitive (101-150)</div>
      <div class="legend-item"><div class="l-circle" style="background:#ff0000;"></div> Unhealthy (151+)</div>
      <hr style="border:0; border-top:1px solid var(--border); margin:10px 0;">
      <div class="legend-item"><div class="l-circle" style="border: 2px solid #fff;"></div> PurpleAir (Solid)</div>
      <div class="legend-item"><div class="l-circle" style="border: 3px double #fff; width:18px; height:18px;"></div> QuantAQ (Nested)</div>
      <div class="legend-item"><div class="l-circle" style="border: 5px solid #fff;"></div> C-12 (Target)</div>
    </div>
  </aside>

  <div id="main-content">
    <div id="map"></div>
    <div id="chart-box"><canvas id="airChart"></canvas></div>
  </div>
</div>

<script>
  const API_PROXY = "/api/aq";

  const SENSORS = {
    "284362": "EJAT.PG.1.284362", "52823": "EJAT.CV.6.52823", "53677": "EJAT.CV.1.53677",
    "54239": "EJAT.CV.6.54239", "54293": "EJAT.CV.2.54293", "57777": "EJAT.CV.1.57777",
    "57783": "EJAT.CV.6.57783", "57811": "EJAT.CV.4.57811", "57841": "EJAT.CV.3.57841",
    "57955": "EJAT.FH.1.57955", "160037": "EJAT.PG.1.160037", "175563": "EJAT.PG.1.175563",
    "178169": "EJAT.PG.1.178169", "181253": "EJAT.CH.1.181253", "184191": "EJAT.PG.1.184191",
    "185085": "EJAT.FH.1.185085", "197937": "EJAT.PG.1.197937", "203577": "EJAT.CV.2.203577 (Supersite)",
    "203597": "EJAT.FH.1.203597", "203601": "EJAT.CV.1.203601", "207729": "EJAT.CV.1.207729",
    "211993": "EJAT.CV.3.211993", "218227": "EJAT.PG.1.218227", "218237": "EJAT.PG.1.218237",
    "218273": "EJAT.PG.1.218273"
  };

  const SPODS = [
    { sn: "MOD-00536", name: "QuantAQ MOD-00536", lat: 38.920551, lon: -76.91951 },
    { sn: "MOD-00537", name: "QuantAQ MOD-00537", lat: 39.243000, lon: -76.512400 },
    { sn: "MOD-00733", name: "QuantAQ MOD-00733", lat: 38.905700, lon: -76.911500 },
    { sn: "MOD-00745", name: "QuantAQ MOD-00745", lat: 38.905100, lon: -76.910000 },
    { sn: "MOD-00746", name: "QuantAQ MOD-00746", lat: 39.143200, lon: -76.846000 },
    { sn: "MOD-00747", name: "QuantAQ MOD-00747", lat: 39.233944, lon: -76.504501 },
    { sn: "MOD-00748", name: "QuantAQ MOD-00748", lat: 38.969685, lon: -76.542290 },
    { sn: "MOD-00749", name: "QuantAQ MOD-00749", lat: 39.055400, lon: -76.878800 },
    { sn: "MOD-00760", name: "QuantAQ MOD-00760", lat: 39.055200, lon: -76.878600 },
    { sn: "MOD-00824", name: "QuantAQ MOD-00824", lat: 39.224470, lon: -76.587008 }
  ];

  const C12S = [
    { compId: "D14781", name: "C-12 D14781 (Mosleys)" },
    { compId: "D14645", name: "C-12 D14645 (Mr. Jones)" },
    { compId: "D17615", name: "C-12 D17615 (Pacrust)" },
    { compId: "E10588", name: "C-12 E10588 (Lab)" },
    { compId: "D14646", name: "C-12 D14646 (UMD Chem)" }
  ];

  const CITY_AVG_SENSORS = [14633, 75995, 12595];
  let markerMap = {};
  let userMarker = null;

  const map = L.map("map", { zoomControl: false }).setView([38.922, -76.915], 11);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png").addTo(map);

  const chart = new Chart(document.getElementById("airChart").getContext("2d"), {
    type: "line",
    data: { datasets: [
      { label: "Local Station", data: [], borderColor: "#00d2ff", backgroundColor: "rgba(0, 210, 255, 0.1)", tension: 0.4, fill: true },
      { label: "DC City Average", data: [], borderColor: "#ff4444", borderDash: [5,5], pointRadius: 0, fill: false }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: "#8b949e" } } },
      scales: { x: { type: "time", grid: { color: "#1b1f24" }, ticks: { color: "#8b949e" } }, y: { grid: { color: "#1b1f24" }, ticks: { color: "#8b949e" } } }
    }
  });

  // UTILITY & API LOGIC
  function getAQIColor(aqi) {
    if (aqi <= 50) return "#00e400";
    if (aqi <= 100) return "#ffff00";
    if (aqi <= 150) return "#ff7e00";
    return "#ff0000";
  }

  function makeCircleIcon(color, type) {
    let innerStyle = `background:${color}; border-radius:50%; box-shadow: 0 0 10px ${color};`;
    if (type === "SPOD") innerStyle += "border: 2px double #fff; width:18px; height:18px;";
    else if (type === "C12") innerStyle += "border: 5px solid #fff; width:16px; height:16px;";
    else innerStyle += "border: 2px solid #fff; width:16px; height:16px;";

    return L.divIcon({
      className: "ht-marker",
      html: `<div style="${innerStyle}"></div>`,
      iconSize: [20, 20], iconAnchor: [10, 10]
    });
  }

  async function proxyGet(params) {
    const url = API_PROXY + "?" + new URLSearchParams(params).toString();
    const res = await fetch(url);
    return res.ok ? await res.json() : null;
  }

  // DATA PROCESSING
  const BP_PM25_24H = [
    { cLow: 0.0, cHigh: 12.0, iLow: 0, iHigh: 50 },
    { cLow: 12.1, cHigh: 35.4, iLow: 51, iHigh: 100 },
    { cLow: 35.5, cHigh: 55.4, iLow: 101, iHigh: 150 },
    { cLow: 55.5, cHigh: 150.4, iLow: 151, iHigh: 200 }
  ];

  function aqiFromBreakpoints(C, table) {
    if (C === null) return null;
    const c = Number(C);
    for (const bp of table) {
      if (c >= bp.cLow && c <= bp.cHigh) return Math.round(((bp.iHigh - bp.iLow) / (bp.cHigh - bp.cLow)) * (c - bp.cLow) + bp.iLow);
    }
    return c > 150.4 ? 201 : null;
  }

  function computeCEAQIFromAQIs(aqis) {
    const list = aqis.filter(v => v !== null);
    if (!list.length) return 0;
    const base = Math.max(...list);
    let adders = 0;
    list.forEach(a => { if (a !== base) { const pct = a >= 120 ? 0.03 : (a >= 100 ? 0.02 : (a >= 80 ? 0.01 : 0)); adders += base * pct; }});
    return Math.round(base + adders);
  }

  async function updateDisplay(id) {
    const start = Math.floor(Date.now() / 1000) - 86400;
    document.getElementById("c12Vars").style.display = id.startsWith("C12-") ? "grid" : "none";

    if (id.startsWith("C12-")) {
      const compId = id.replace("C12-", "");
      const res = await proxyGet({ action: "grove_last", compId });
      const rows = Array.isArray(res) ? res : (res?.data || []);
      const bc = rows.find(r => r.streamId === "880nm")?.data;
      const t = rows.find(r => r.streamId === "880nm")?.time;
      const aqi = bc ? Math.round((bc / 600) * 100) : 0;
      setLeftReadout(C12S.find(x => x.compId === compId).name, aqi, aqi);
      document.getElementById("c12_bc").innerText = bc || "--";
      document.getElementById("c12_time").innerText = t ? new Date(t).toLocaleTimeString() : "--";
      chart.data.datasets[0].data = []; chart.update();
    } else if (id.startsWith("MOD-")) {
      const res = await proxyGet({ action: "quantaq_history", compId: id });
      if (res) {
        const series = res.map(r => ({ x: r.time, y: aqiFromBreakpoints(r.pm25, BP_PM25_24H) || 0 }));
        const latest = series[series.length-1]?.y || 0;
        setLeftReadout(id, latest, latest);
        chart.data.datasets[0].data = series; chart.update();
      }
    } else {
      const res = await proxyGet({ action: "purpleair_history", id, start });
      if (res?.data) {
        const series = res.data.map(r => ({ x: r[0]*1000, y: aqiFromBreakpoints(r[1], BP_PM25_24H) || 0 }));
        const latest = series[series.length-1]?.y || 0;
        setLeftReadout(SENSORS[id], latest, latest);
        chart.data.datasets[0].data = series; chart.update();
      }
    }
  }

  function setLeftReadout(name, cur, ce) {
    document.getElementById("statName").innerText = name;
    document.getElementById("statAQI").innerText = cur;
    document.getElementById("statAQI").style.color = getAQIColor(cur);
    document.getElementById("statCE").innerText = ce;
    document.getElementById("statCE").style.color = getAQIColor(ce);
  }

  function handleDropdownChange(id) { map.flyTo(markerMap[id].getLatLng(), 15); updateDisplay(id); }

  document.getElementById("locateBtn").onclick = async () => {
    const q = document.getElementById("addrInput").value;
    if (!q) return;
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q + ", MD")}`);
    const data = await res.json();
    if (data.length) {
      const loc = [data[0].lat, data[0].lon];
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker(loc, { icon: L.divIcon({ className: "search-pulse", iconSize:[20,20] }) }).addTo(map);
      map.flyTo(loc, 15);
    }
  };

  async function init() {
    const sel = document.getElementById("devSel");
    const pa = await proxyGet({ action: "purpleair_box" });
    
    // Add PurpleAir
    if (pa?.data) {
      pa.data.forEach(r => {
        const id = String(r[0]);
        if (SENSORS[id]) {
          const m = L.circleMarker([r[1], r[2]], { radius: 10, fillColor: "#444", color: "#fff", weight: 2, fillOpacity: 0.8 }).addTo(map);
          markerMap[id] = m; sel.add(new Option(SENSORS[id], id));
          m.on("click", () => { sel.value = id; handleDropdownChange(id); });
        }
      });
    }

    // Add QuantAQ
    SPODS.forEach(s => {
      const m = L.marker([s.lat, s.lon], { icon: makeCircleIcon("#444", "SPOD") }).addTo(map);
      markerMap[s.sn] = m; sel.add(new Option(s.name, s.sn));
      m.on("click", () => { sel.value = s.sn; handleDropdownChange(s.sn); });
    });

    // Add C-12
    for (const c of C12S) {
      const res = await proxyGet({ action: "grove_last", compId: c.compId });
      const rows = Array.isArray(res) ? res : (res?.data || []);
      const lat = rows.find(r => r.streamId === "lat")?.data;
      const lon = rows.find(r => r.streamId === "long")?.data;
      if (lat && lon) {
        const id = `C12-${c.compId}`;
        const m = L.marker([lat, lon], { icon: makeCircleIcon("#444", "C12") }).addTo(map);
        markerMap[id] = m; sel.add(new Option(c.name, id));
        m.on("click", () => { sel.value = id; handleDropdownChange(id); });
      }
    }
    if (sel.options.length) handleDropdownChange(sel.value = markerMap["203577"] ? "203577" : sel.options[0].value);
  }

  init();
</script>
</body>
</html>
